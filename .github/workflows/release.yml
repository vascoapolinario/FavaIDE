name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FavaStudio.sln

      - name: Build
        run: dotnet build FavaStudio.sln -c Release --no-restore

      - name: Publish win-x64
        run: dotnet publish src/FavaStudio/FavaStudio.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/win-x64

      - name: Archive
        shell: pwsh
        run: |
          Compress-Archive -Path publish/win-x64/* -DestinationPath FavaStudio-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FavaStudio-win-x64
          path: FavaStudio-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FavaStudio-win-x64.zip
          generate_release_notes: true
